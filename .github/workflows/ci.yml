name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Cache Docker layers so rebuilds are fast when the Dockerfile hasn't changed
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('tests/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build CI image
        run: docker build -t etherjack-ci -f tests/Dockerfile .

      # --------------------------------------------------------------------------
      # ShellCheck — static analysis on all scripts
      # The .shellcheckrc in the repo root suppresses SC1091/SC2154 which are
      # false positives caused by inter-script variable sourcing.
      # --------------------------------------------------------------------------
      - name: ShellCheck
        run: |
          docker run --rm -v "$PWD:/etherjack" etherjack-ci \
            bash -c 'find /etherjack -name "*.sh" -not -path "/etherjack/.git/*" \
                       | xargs shellcheck --severity=error'

      # --------------------------------------------------------------------------
      # BATS unit / integration tests
      # --------------------------------------------------------------------------
      - name: BATS Tests
        run: |
          docker run --rm -v "$PWD:/etherjack" etherjack-ci \
            bash -c 'cd /etherjack && bats tests/'

      # --------------------------------------------------------------------------
      # Confirm every script is executable (permissions survive git clone)
      # --------------------------------------------------------------------------
      - name: Script Permissions
        run: |
          docker run --rm -v "$PWD:/etherjack" etherjack-ci bash -c '
            failed=0
            while IFS= read -r script; do
              if [ ! -x "$script" ]; then
                echo "NOT EXECUTABLE: $script"
                failed=1
              fi
            done < <(find /etherjack -name "*.sh" -not -path "/etherjack/.git/*")
            exit "$failed"
          '
