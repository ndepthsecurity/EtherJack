---
name: CI

"on":
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_call:

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Cache Docker layers so rebuilds are fast when the Dockerfile hasn't changed
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('tests/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build CI image
        run: docker build -t etherjack-ci -f tests/Dockerfile .

      # --------------------------------------------------------------------------
      # Lint — ShellCheck on all scripts and bats tests, yamllint on workflows,
      # shfmt to enforce consistent indentation (catches mixed tabs/spaces).
      # .shellcheckrc suppresses SC1091/SC2154 (false positives from sourcing)
      # .yamllint.yml holds the shared rule config used locally and here
      # --------------------------------------------------------------------------
      - name: ShellCheck
        run: |
          docker run --rm -v "$PWD:/etherjack" etherjack-ci bash -c '
            find /etherjack \( -name "*.sh" -o -name "*.bats" \) \
              -not -path "/etherjack/.git/*" \
              | xargs shellcheck --severity=warning
          '

      - name: shfmt
        run: |
          docker run --rm -v "$PWD:/etherjack" etherjack-ci bash -c '
            find /etherjack \( -name "*.sh" -o -name "*.bats" \) \
              -not -path "/etherjack/.git/*" \
              | xargs shfmt -d -i 4
          '

      - name: yamllint
        run: |
          docker run --rm -v "$PWD:/etherjack" etherjack-ci bash -c '
            find /etherjack/.github -name "*.yml" \
              | xargs yamllint -c /etherjack/.yamllint.yml
          '

      # --------------------------------------------------------------------------
      # BATS unit / integration tests
      # --report-formatter writes a TAP file to /results while still printing
      # pretty output to the console; if: always() ensures the artifact is
      # uploaded even when tests fail so failures are always inspectable.
      # --------------------------------------------------------------------------
      - name: BATS Tests
        run: |
          mkdir -p test-results
          docker run --rm \
            -v "$PWD:/etherjack" \
            -v "$PWD/test-results:/results" \
            etherjack-ci \
            bash -c 'cd /etherjack && bats --report-formatter tap --output /results tests/'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-test-results
          path: test-results/

      - name: Prune old artifacts (keep last 3)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts?name=bats-test-results&per_page=100" \
            --jq '.artifacts | sort_by(.created_at) | reverse | .[3:] | .[].id' \
          | xargs -r -I{} gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/{}"

      # --------------------------------------------------------------------------
      # Confirm every script is executable (permissions survive git clone)
      # --------------------------------------------------------------------------
      - name: Script Permissions
        run: |
          docker run --rm -v "$PWD:/etherjack" etherjack-ci bash -c '
            failed=0
            while IFS= read -r script; do
              if [ ! -x "$script" ]; then
                echo "NOT EXECUTABLE: $script"
                failed=1
              fi
            done < <(find /etherjack -name "*.sh" -not -path "/etherjack/.git/*")
            exit "$failed"
          '
